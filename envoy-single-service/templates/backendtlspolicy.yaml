{{- if .Values.backend.tlsEnabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: {{ include "envoy-single-service.backendTLSPolicyName" . }}
  namespace: {{ include "envoy-single-service.backendNamespace" . }}
  labels:
    {{- include "envoy-single-service.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: {{ include "envoy-single-service.serviceName" . }}
  validation:
    caCertificateRefs:
      - group: ""
        kind: Secret
        name: {{ .Values.backend.caSecretName }}
    hostname: {{ .Values.backend.hostname | quote }}
{{- end }}
